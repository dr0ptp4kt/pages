<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Cosmic Runner V3: V8 Sessions</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Title Screen -->
  <div id="title-screen" class="screen active">
    <div class="title-content">
      <h1 class="title-text">COSMIC RUNNER</h1>
      <p class="subtitle">V8 Sessions &mdash; V3</p>
      <div class="title-aki" id="title-aki"></div>
      <div class="mode-select">
        <button class="mode-btn" id="mode-player" data-mode="player">
          <span class="mode-icon">&#9835;</span>
          <span class="mode-label">Music Player</span>
        </button>
        <button class="mode-btn selected" id="mode-game" data-mode="game">
          <span class="mode-icon">&#9654;</span>
          <span class="mode-label">Game</span>
        </button>
        <button class="mode-btn" id="mode-grid" data-mode="grid">
          <span class="mode-icon">&#9638;</span>
          <span class="mode-label">Grid</span>
        </button>
      </div>
      <div class="player-count-select">
        <button class="player-count-btn selected" data-players="1">1 Player</button>
        <button class="player-count-btn" data-players="2">2 Players</button>
      </div>
      <button class="start-btn" id="start-btn">START</button>
      <div class="title-links">
        <button class="link-btn" id="theme-btn">Themes</button>
        <button class="link-btn" id="accessibility-btn">Accessibility</button>
      </div>
      <p class="controls-hint">
        SPACE / TAP to jump (multi-jump!) &bull; 1/2/3 switch modes &bull; P pause &bull; +/- speed
      </p>
    </div>
  </div>

  <!-- Theme Picker Overlay -->
  <div class="overlay" id="theme-overlay">
    <div class="overlay-panel theme-panel">
      <h2>Choose Theme</h2>
      <div class="theme-grid" id="theme-grid"></div>
      <h3>Star Style</h3>
      <div class="star-grid" id="star-grid"></div>
      <button class="overlay-close" id="theme-close">Done</button>
    </div>
  </div>

  <!-- Accessibility Overlay -->
  <div class="overlay" id="accessibility-overlay">
    <div class="overlay-panel">
      <h2>Accessibility</h2>
      <div class="access-modes">
        <button class="access-btn" data-access="minimal">
          <strong>Minimal</strong>
          <span>No stars, no flash effects, no glow. Clean gameplay.</span>
        </button>
        <button class="access-btn selected" data-access="normal">
          <strong>Normal</strong>
          <span>Standard effects and visuals.</span>
        </button>
        <button class="access-btn" data-access="flashy">
          <strong>Extra Flashy</strong>
          <span>Stronger colors, glimmer effects on notes.</span>
        </button>
      </div>
      <button class="overlay-close" id="access-close">Done</button>
    </div>
  </div>

  <!-- Main Screen -->
  <div id="main-screen" class="screen">
    <canvas id="main-canvas"></canvas>

    <!-- Song title display (player mode) -->
    <div class="song-title-display" id="song-title-display"></div>

    <!-- Full-screen blast overlay -->
    <canvas id="blast-canvas"></canvas>

    <!-- HUD overlay -->
    <div class="hud" id="hud">
      <div class="hud-left">
        <span class="hud-score" id="hud-score">0</span>
        <span class="hud-label" id="hud-score-label">POINTS</span>
        <span class="hud-names" id="hud-names"></span>
      </div>
      <div class="hud-center">
        <span class="hud-track" id="hud-track"></span>
        <span class="hud-epoch" id="hud-epoch"></span>
      </div>
      <div class="hud-right">
        <div class="mode-tabs" id="mode-tabs">
          <button class="tab-btn" data-mode="player" title="Music Player (1)">&#9835;</button>
          <button class="tab-btn active" data-mode="game" title="Game (2)">&#9654;</button>
          <button class="tab-btn" data-mode="grid" title="Grid (3)">&#9638;</button>
        </div>
        <div class="grid-dim-tabs" id="grid-dim-tabs" style="display:none">
          <button class="dim-btn active" data-dim="2d">2D</button>
          <button class="dim-btn" data-dim="3d">3D</button>
        </div>
        <button class="hud-btn" id="speed-down" title="Slower">-</button>
        <button class="hud-btn" id="speed-up" title="Faster">+</button>
        <button class="hud-btn" id="pause-btn" title="Pause">&#9646;&#9646;</button>
        <button class="hud-btn" id="mute-btn" title="Mute">&#128266;</button>
        <button class="hud-btn" id="ingame-theme-btn" title="Theme">&#127912;</button>
        <button class="hud-btn" id="ingame-access-btn" title="Accessibility">&#9881;</button>
      </div>
    </div>

    <!-- Music player bar (bottom) -->
    <div class="music-bar" id="music-bar">
      <div class="music-controls">
        <button class="music-btn" id="prev-btn" title="Previous">&#9198;</button>
        <button class="music-btn" id="play-btn" title="Play/Pause">&#9654;</button>
        <button class="music-btn" id="next-btn" title="Next">&#9197;</button>
      </div>
      <div class="music-progress">
        <input type="range" class="music-seek" id="music-seek" min="0" max="100" value="0" step="0.1">
        <span class="music-time" id="music-time">0:00 / 0:00</span>
      </div>
      <div class="music-volume">
        <input type="range" class="music-vol" id="music-vol" min="0" max="100" value="80">
      </div>
    </div>

    <!-- Note info panel -->
    <div class="note-info" id="note-info">
      <div class="note-info-content" id="note-info-content"></div>
    </div>
  </div>

  <!-- Track list overlay -->
  <div class="track-overlay" id="track-overlay">
    <div class="track-list-panel" id="track-list-panel"></div>
  </div>

  <!-- Scripts -->
  <script src="js/config.js"></script>
  <script src="js/themes.js"></script>
  <script src="js/music-sync.js"></script>
  <script src="js/background.js"></script>
  <script src="js/characters.js"></script>
  <script src="js/runner.js"></script>
  <script src="js/obstacles.js"></script>
  <script src="js/renderer3d.js"></script>
  <script src="js/blast-effect.js"></script>
  <script src="js/game.js"></script>
  <script src="js/player.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
