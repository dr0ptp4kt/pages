<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello worlds</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #020005; /* Deep void background */
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }

        #container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        /* Canvas size: 200vmax ensures coverage during rotation.
           Rendering: Pixelated for crisp cellular automata edges.
        */
        canvas {
            position: absolute;
            width: 200vmax;
            height: 200vmax;
            image-rendering: pixelated; 
            box-shadow: 0 0 150px rgba(100, 0, 255, 0.15); /* Ambient glow */
            will-change: transform;
        }

        /* UI Overlay */
        #ui-layer {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
            display: flex;
            gap: 10px;
        }

        .ui-btn {
            background-color: rgba(20, 10, 40, 0.6);
            color: #e0ccff;
            border: 1px solid rgba(180, 160, 255, 0.4);
            padding: 8px 16px;
            cursor: pointer;
            font-size: 12px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            backdrop-filter: blur(4px);
            font-family: 'Courier New', Courier, monospace;
            min-width: 170px;
        }

        .ui-btn:hover {
            background-color: rgba(180, 160, 255, 0.25);
            border-color: #fff;
            color: #fff;
            box-shadow: 0 0 10px rgba(180, 160, 255, 0.4);
        }
        
        #loading {
            position: absolute;
            color: #fff;
            font-size: 24px;
            z-index: 5;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>

    <div id="container">
        <div id="loading">Initializing Universe...</div>
        <canvas id="caCanvas"></canvas>
    </div>

    <div id="ui-layer">
        <button id="pauseBtn" class="ui-btn">Spacebar to Pause</button>
        <button id="fsBtn" class="ui-btn">Fullscreen (F)</button>
    </div>

    /**
     * STATE
     */
    const canvas = document.getElementById('caCanvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    
    canvas.width = COLS;
    canvas.height = ROWS;

    let rowStructure = new Uint8Array(COLS);
    let rowIntensity = new Uint8Array(COLS);
    
    let isPaused = false;
    let totalTicks = 0; 
    let paletteIndex = 0;

    // Rotation State
    let currentAngle = 0;      
    let currentSpeed = 1;      
    let lastRotParamUpdate = 0; 
    let lastFrameTime = 0;     

    // Color State (Start with Palette 0)
    const initialPaletteIndex = Math.floor(Math.random() * PALETTES.length);
    let currLow  = { ...PALETTES[initialPaletteIndex].low };
    let currHigh = { ...PALETTES[initialPaletteIndex].high };
    let currBg   = { ...PALETTES[initialPaletteIndex].bg };
    
    // Target Colors
    let targetLow  = { ...PALETTES[0].low };
    let targetHigh = { ...PALETTES[0].high };
    let targetBg   = { ...PALETTES[0].bg };

    /**
     * UTILS
     */
    function lerp(start, end, amt) {
        return start + (end - start) * amt;
    }

    // This runs every frame to slowly drag the current color towards the target
    function updateColors() {
        currLow.r = lerp(currLow.r, targetLow.r, LERP_SPEED);
        currLow.g = lerp(currLow.g, targetLow.g, LERP_SPEED);
        currLow.b = lerp(currLow.b, targetLow.b, LERP_SPEED);

        currHigh.r = lerp(currHigh.r, targetHigh.r, LERP_SPEED);
        currHigh.g = lerp(currHigh.g, targetHigh.g, LERP_SPEED);
        currHigh.b = lerp(currHigh.b, targetHigh.b, LERP_SPEED);

        currBg.r = lerp(currBg.r, targetBg.r, LERP_SPEED);
        currBg.g = lerp(currBg.g, targetBg.g, LERP_SPEED);
        currBg.b = lerp(currBg.b, targetBg.b, LERP_SPEED);
    }

    /**
     * INITIALIZATION
     */
    function init() {
        const loading = document.getElementById('loading');
        loading.style.opacity = 1;

        // 1. Seed
        for (let i = 0; i < COLS; i++) {
            rowStructure[i] = Math.random() > 0.5 ? 1 : 0;
            rowIntensity[i] = Math.random() > 0.5 ? 1 : 0;
        }

        // 2. PRE-FILL BUFFER
        const fullImage = ctx.createImageData(COLS, ROWS);
        const data = fullImage.data;

        const rL = currLow.r, gL = currLow.g, bL = currLow.b;
        const rH = currHigh.r, gH = currHigh.g, bH = currHigh.b;
        const rB = currBg.r,  gB = currBg.g,  bB = currBg.b;

        for (let y = 0; y < ROWS; y++) {
            for (let x = 0; x < COLS; x++) {
                const idx = (y * COLS + x) * 4;
                if (rowStructure[x] === 1) {
                    const intense = rowIntensity[x] === 1;
                    data[idx]     = intense ? rH : rL;
                    data[idx + 1] = intense ? gH : gL;
                    data[idx + 2] = intense ? bH : bL;
                    data[idx + 3] = 255;
                } else {
                    data[idx] = rB; data[idx+1] = gB; data[idx+2] = bB; data[idx+3] = 255;
                }
            }
            rowStructure = computeNextGeneration(rowStructure);
            rowIntensity = computeNextGeneration(rowIntensity);
        }

        // 3. Paint once
        ctx.putImageData(fullImage, 0, 0);
        loading.style.opacity = 0;

        // 4. Start Loops
        requestAnimationFrame(tickLoop);
        requestAnimationFrame(animateRotation);
    }

    /**
     * ROTATION LOOP
     */
    function animateRotation(timestamp) {
        if (!lastFrameTime) lastFrameTime = timestamp;
        
        const dt = (timestamp - lastFrameTime) / 1000;
        lastFrameTime = timestamp;

        if (timestamp - lastRotParamUpdate > ROTATION_CHANGE_MS) {
            const direction = Math.random() > 0.5 ? 1 : -1;
            const speed = MIN_ROT_SPEED + Math.random() * (MAX_ROT_SPEED - MIN_ROT_SPEED);
            currentSpeed = speed * direction;
            lastRotParamUpdate = timestamp;
        }

        currentAngle += currentSpeed * dt;
        canvas.style.transform = `rotate(${currentAngle}deg)`;
        
        requestAnimationFrame(animateRotation);
    }

    /**
     * CELLULAR AUTOMATA LOGIC
     */
    function computeNextGeneration(currentArray) {
        const nextArray = new Uint8Array(COLS);
        
        for (let i = 0; i < COLS; i++) {
            
            // Entropy injection
            if (Math.random() < RANDOM_RATE) {
                nextArray[i] = Math.random() > 0.5 ? 1 : 0;
                continue; 
            }

            const left   = currentArray[(i - 1 + COLS) % COLS];
            const center = currentArray[i];
            const right  = currentArray[(i + 1) % COLS];

            // Rule 110
            let val = 0;
            if (left === 1 && center === 1 && right === 1) val = 0;
            else if (left === 1 && center === 1 && right === 0) val = 1;
            else if (left === 1 && center === 0 && right === 1) val = 1;
            else if (left === 1 && center === 0 && right === 0) val = 0;
            else if (left === 0 && center === 1 && right === 1) val = 1;
            else if (left === 0 && center === 1 && right === 0) val = 1;
            else if (left === 0 && center === 0 && right === 1) val = 1;
            else if (left === 0 && center === 0 && right === 0) val = 0;
            
            nextArray[i] = val;
        }
        return nextArray;
    }

    /**
     * MAIN DRAW LOOP
     */
    let lastTick = 0;

    function tickLoop(timestamp) {
        if (!lastTick) lastTick = timestamp;
        const delta = timestamp - lastTick;

        if (!isPaused && delta > TICK_MS) {
            lastTick = timestamp;
            totalTicks++;

            // CHECK FOR COLOR CYCLE EVERY 3000 TICKS
            if (totalTicks % CYCLE_TICKS === 0) {
                paletteIndex = Math.floor(Math.random() * PALETTES.length);

                // Set the new target
                targetLow  = PALETTES[paletteIndex].low;
                targetHigh = PALETTES[paletteIndex].high;
                targetBg   = PALETTES[paletteIndex].bg;
                
                // console.log("Morphing to palette index:", paletteIndex);
            }

            updateColors();

            // Shift image UP
            ctx.drawImage(canvas, 0, 1, COLS, ROWS - 1, 0, 0, COLS, ROWS - 1);
            
            // Draw NEW row
            drawSingleRow(ROWS - 1);

            // Compute next
            rowStructure = computeNextGeneration(rowStructure);
            rowIntensity = computeNextGeneration(rowIntensity);
        }

        requestAnimationFrame(tickLoop);
    }

    function drawSingleRow(y) {
        const imgData = ctx.createImageData(COLS, 1);
        const data = imgData.data;

        // Convert current floating point colors to integers for this frame
        const rL = Math.floor(currLow.r), gL = Math.floor(currLow.g), bL = Math.floor(currLow.b);
        const rH = Math.floor(currHigh.r), gH = Math.floor(currHigh.g), bH = Math.floor(currHigh.b);
        const rB = Math.floor(currBg.r),  gB = Math.floor(currBg.g),  bB = Math.floor(currBg.b);

        for (let i = 0; i < COLS; i++) {
            const index = i * 4;
            if (rowStructure[i] === 1) {
                const intense = rowIntensity[i] === 1;
                data[index]     = intense ? rH : rL;
                data[index + 1] = intense ? gH : gL;
                data[index + 2] = intense ? bH : bL;
                data[index + 3] = 255; 
            } else {
                data[index] = rB; data[index+1] = gB; data[index+2] = bB; data[index+3] = 255;
            }
        }
        ctx.putImageData(imgData, 0, y);
    }

    /**
     * UI & EVENTS
     */
    const fsBtn = document.getElementById('fsBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const container = document.getElementById('container');

    function togglePause() {
        isPaused = !isPaused;
        pauseBtn.textContent = isPaused ? "Spacebar to Resume" : "Spacebar to Pause";
    }

    pauseBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        togglePause();
    });

    container.addEventListener('click', togglePause);

    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
            e.preventDefault();
            togglePause();
        }
        if (e.key.toLowerCase() === 'f') {
            toggleFullScreen();
        }
    });

    function toggleFullScreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(console.error);
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
        }
    }

    fsBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleFullScreen();
    });

    document.addEventListener('fullscreenchange', () => {
        fsBtn.textContent = document.fullscreenElement ? "Exit Fullscreen (F)" : "Fullscreen (F)";
    });

    setTimeout(init, 100);

</script>
</body>
</html>
