<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>In The Beginning — V8 Sessions Visualizer</title>
  <link rel="stylesheet" href="css/visualizer.css">
</head>
<body>
  <div class="app-container">
    <!-- Status bar -->
    <div class="status-bar">
      <span class="status-message" id="status-message"></span>
    </div>

    <!-- File input -->
    <div class="file-input-wrapper">
      <label class="file-input-label">
        Load Score
        <input type="file" id="score-file-input" accept=".json,.mid,.midi">
      </label>
    </div>

    <!-- Main area: track list + grid -->
    <div class="main-area">
      <div class="track-list" id="track-list"></div>
      <div class="grid-wrapper">
        <div id="grid-container"></div>
      </div>
    </div>

    <!-- MIDI info panel (shows source MIDI, raw arrangement, then effects) -->
    <div class="midi-info-panel" id="midi-info-panel">
      <div class="midi-info-source" id="midi-info-source"></div>
      <div class="midi-info-notes" id="midi-info-notes"></div>
      <div class="midi-info-composer" id="midi-info-composer"></div>
      <div class="midi-info-piece" id="midi-info-piece"></div>
      <div class="midi-info-mutation" id="midi-info-mutation"></div>
    </div>

    <!-- Synth info panel (shows epoch, track, seed) -->
    <div class="synth-info-panel" id="synth-info-panel">
      <div class="synth-info-epoch" id="synth-info-epoch"></div>
      <div class="synth-info-track" id="synth-info-track"></div>
      <div class="synth-info-seed" id="synth-info-seed"></div>
    </div>

    <!-- MIDI mode controls -->
    <div class="midi-controls" id="midi-controls" style="display:none">
      <button class="midi-ctrl-btn" id="midi-prev" title="Previous MIDI">&#9198;</button>
      <button class="midi-ctrl-btn" id="midi-next" title="Next MIDI">&#9197;</button>
      <button class="midi-ctrl-btn" id="midi-mutate" title="Change Mutation">&#9836;</button>
      <span class="midi-mutation-label" id="midi-mutation-label">Original</span>
      <label class="midi-toggle">
        <input type="checkbox" id="midi-infinite-toggle">
        <span>Infinite</span>
      </label>
    </div>

    <!-- ID3 info panel (near play controls) -->
    <div class="id3-panel" id="id3-panel">
      <span class="id3-title" id="id3-title"></span>
      <span class="id3-artist" id="id3-artist"></span>
      <span class="id3-album-info" id="id3-album-info"></span>
    </div>

    <!-- Control bar -->
    <div id="control-bar"></div>

    <!-- Stream status banner (shown when stream unavailable) -->
    <div class="stream-status" id="stream-status" style="display:none">
      <span class="stream-status-icon">&#9888;</span>
      <span class="stream-status-text" id="stream-status-text">Stream server not detected</span>
      <button class="stream-status-dismiss" id="stream-status-dismiss">&times;</button>
    </div>

    <!-- Mode selector (appears at top-right when MIDI catalog available) -->
    <div class="mode-selector" id="mode-selector" style="display:none">
      <button class="mode-tab active" data-mode="album" id="mode-album">Album</button>
      <button class="mode-tab" data-mode="midi" id="mode-midi">MIDI</button>
      <button class="mode-tab" data-mode="synth" id="mode-synth">Synth</button>
      <button class="mode-tab" data-mode="stream" id="mode-stream">Stream</button>
    </div>
  </div>

  <!-- Scripts (no build step, no bundler) -->
  <script src="js/grid.js"></script>
  <script src="js/score.js"></script>
  <script src="js/synth-engine.js"></script>
  <script src="js/midi-player.js"></script>
  <script src="js/player.js"></script>
  <script src="js/music-generator.js"></script>
  <script src="js/stream.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
